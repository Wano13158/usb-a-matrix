<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USB-A Tuwunel Messenger</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>USB-A Tuwunel Messenger</h1>
      <p class="subtitle">Веб-клиент и серверная сторона для Tuwunel</p>

      <section class="card">
        <h2>1) Авторизация</h2>
        <div class="grid">
          <input id="username" placeholder="username" />
          <input id="password" type="password" placeholder="password" />
        </div>
        <div class="row">
          <button id="registerBtn">Регистрация</button>
          <button id="loginBtn">Войти</button>
        </div>
        <p id="sessionInfo" class="info">Нет сессии</p>
      </section>

      <section class="card">
        <h2>2) Комната</h2>
        <div class="row">
          <input id="roomIdOrAlias" placeholder="!roomId:server или #alias:server" />
          <button id="joinBtn">Подключиться</button>
          <button id="loadRoomsBtn">Мои комнаты</button>
        </div>
        <pre id="roomsOutput" class="output"></pre>
      </section>

      <section class="card">
        <h2>3) Чат</h2>
        <div class="row">
          <input id="activeRoomId" placeholder="ID комнаты для чата" />
          <button id="loadMessagesBtn">Загрузить сообщения</button>
        </div>
        <div class="row">
          <input id="messageText" placeholder="Сообщение" />
          <button id="sendMessageBtn">Отправить</button>
        </div>
        <pre id="messagesOutput" class="output"></pre>
      </section>

      <p id="status" class="status">Готово.</p>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
