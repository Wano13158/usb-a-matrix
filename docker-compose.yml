services:
  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: tuwunel
    restart: unless-stopped
    environment:
      TUWUNEL_SERVER_NAME: ${TUWUNEL_SERVER_NAME:-matrix.local}
      TUWUNEL_ALLOW_REGISTRATION: ${TUWUNEL_ALLOW_REGISTRATION:-true}
      TUWUNEL_REGISTRATION_TOKEN: ${TUWUNEL_REGISTRATION_TOKEN:-}
      TUWUNEL_PORT: ${TUWUNEL_PORT:-6167}
    volumes:
      - ./tuwunel-data:/var/lib/tuwunel
    ports:
      - "8008:6167"

  usb-a-matrix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usb-a-matrix
    restart: unless-stopped
    environment:
      PORT: 3000
      MATRIX_BASE_URL: http://tuwunel:6167
      MATRIX_SHARED_SECRET: ${MATRIX_SHARED_SECRET:-}
    depends_on:
      - tuwunel
    ports:
      - "3000:3000"
