services:
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: synapse
    restart: unless-stopped
    environment:
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME:-matrix.local}
      SYNAPSE_REPORT_STATS: ${SYNAPSE_REPORT_STATS:-no}
      UID: 991
      GID: 991
    volumes:
      - ./synapse-data:/data
    ports:
      - "8008:8008"

  usb-a-matrix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usb-a-matrix
    restart: unless-stopped
    environment:
      PORT: 3000
      MATRIX_BASE_URL: http://synapse:8008
      MATRIX_SHARED_SECRET: ${MATRIX_SHARED_SECRET:-}
    depends_on:
      - synapse
    ports:
      - "3000:3000"
